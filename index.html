<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaZixwx - 个人主页</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loader">
        <div class="loader-lines">
            <div class="loader-line left"></div>
            <div class="loader-line right"></div>
        </div>
        <div class="loader-percentage">0%</div>
    </div>

    <div class="background-grid"></div>
    <div class="background-dots"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <main class="main-content">
        <div class="container">
            <section class="profile-section">
                <div class="avatar-wrapper">
                    <div class="avatar-ring"></div>
                    <img src="https://github.com/WaZixwx.png" alt="WaZixwx" class="avatar" id="avatar">
                </div>
                <h1 class="name">WaZixwx</h1>
                <p class="nickname">袜子🧦</p>
            </section>

            <section class="about-section">
                <div class="about-card">
                    <h2 class="section-title">关于我</h2>
                    <p class="about-text">
                        我喜欢听音乐！尤其是黑暗小英文歌和emo中文歌，是纯郁风（），还喜欢写点小说啥的。喜欢玩游戏，喜欢交朋友～
                        <br><br>
                        欢迎来找我玩呀
                    </p>
                </div>
            </section>

            <section class="links-section">
                <div class="link-card qq-card" id="qqCard">
                    <div class="link-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20ZM12 6C10.9 6 10 6.9 10 8C10 9.1 10.9 10 12 10C13.1 10 14 9.1 14 8C14 6.9 13.1 6 12 6ZM12 18C9.79 18 8 16.21 8 14C8 11.79 9.79 10 12 10C14.21 10 16 11.79 16 14C16 16.21 14.21 18 12 18Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <h3>QQ</h3>
                    <p>扫描二维码添加</p>
                    <div class="qr-container" id="qqQr">
                        <div class="qr-wrapper" id="qrWrapper">
                            <img src="src/qq.png" alt="QQ二维码" class="qr-image">
                        </div>
                    </div>
                </div>

                <div class="link-card steam-card" id="steamCard">
                    <div class="link-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20ZM12 6C10.9 6 10 6.9 10 8C10 9.1 10.9 10 12 10C13.1 10 14 9.1 14 8C14 6.9 13.1 6 12 6ZM12 18C9.79 18 8 16.21 8 14C8 11.79 9.79 10 12 10C14.21 10 16 11.79 16 14C16 16.21 14.21 18 12 18Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <h3>Steam</h3>
                    <p>点击复制好友代码</p>
                    <div class="steam-code" id="steamCode">1057277713</div>
                </div>

                <div class="link-card game-card">
                    <div class="link-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20ZM12 6C10.9 6 10 6.9 10 8C10 9.1 10.9 10 12 10C13.1 10 14 9.1 14 8C14 6.9 13.1 6 12 6ZM12 18C9.79 18 8 16.21 8 14C8 11.79 9.79 10 12 10C14.21 10 16 11.79 16 14C16 16.21 14.21 18 12 18Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <h3>游戏ID</h3>
                    <p>全平台同名</p>
                    <div class="game-id">超帅袜狗</div>
                    <p class="game-note">也许有例外 ;)</p>
                </div>
            </section>


        </div>
    </main>

    <div class="copy-toast" id="copyToast">已复制到剪贴板！</div>

    <script src="script.js"></script>
</body>
</html>
