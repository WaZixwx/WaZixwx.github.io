<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaZixwx - 袜子的小窝</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="fonts.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <canvas id="bgCanvas" class="bg-canvas"></canvas>

    <div class="noise-overlay"></div>

    <!-- 语言切换器 -->
    <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn active" data-lang="zh" title="中文">中</button>
        <button class="lang-btn" data-lang="en" title="English">EN</button>
        <button class="lang-btn" data-lang="ja" title="日本語">日</button>
        <button class="lang-btn" data-lang="ko" title="한국어">韩</button>
    </div>

    <div class="loader" id="loader">
        <div class="loader-text">
            <span class="loader-char">L</span>
            <span class="loader-char">o</span>
            <span class="loader-char">a</span>
            <span class="loader-char">d</span>
            <span class="loader-char">i</span>
            <span class="loader-char">n</span>
            <span class="loader-char">g</span>
        </div>
        <div class="loader-bar">
            <div class="loader-progress" id="loaderProgress"></div>
        </div>
    </div>

    <main class="main-content" id="mainContent">
        <div class="container">
            <!-- 头部区域 -->
            <header class="profile-header">
                <div class="avatar-container">
                    <div class="avatar-glow"></div>
                    <div class="avatar-border">
                        <img src="https://github.com/WaZixwx.png" alt="WaZixwx" class="avatar" id="avatar">
                    </div>
                </div>
                <div class="profile-info">
                    <h1 class="name">
                        <span class="name-glitch" data-text="WaZixwx">WaZixwx</span>
                    </h1>
                    <p class="nickname">
                        <span class="nickname-tag" data-i18n="nickname">袜子</span>
                        <span class="nickname-emoji">🧦</span>
                    </p>
                    <div class="profile-divider">
                        <span class="divider-line"></span>
                        <span class="divider-dot"></span>
                        <span class="divider-line"></span>
                    </div>
                </div>
            </header>

            <!-- 关于我 -->
            <section class="about-section">
                <div class="section-header">
                    <span class="section-number">01</span>
                    <h2 class="section-title" data-i18n="aboutTitle">关于我</h2>
                </div>
                <div class="about-card">
                    <div class="about-content">
                        <p class="about-text" data-i18n="aboutText1">
                            我喜欢听音乐！尤其是<span class="highlight">黑暗小英文歌</span>和<span class="highlight">emo中文歌</span>，是纯郁风（）。
                        </p>
                        <p class="about-text" data-i18n="aboutText2">
                            还喜欢写点小说啥的。喜欢玩游戏，喜欢交朋友～
                        </p>
                        <div class="about-footer">
                            <span class="about-welcome" data-i18n="aboutWelcome">欢迎来找我玩呀</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 联系方式 -->
            <section class="links-section">
                <div class="section-header">
                    <span class="section-number">02</span>
                    <h2 class="section-title" data-i18n="linksTitle">找到我</h2>
                </div>

                <div class="links-grid">
                    <!-- 邮箱 -->
                    <div class="link-card email-card" id="emailCard">
                        <div class="card-glow"></div>
                        <div class="card-inner">
                            <div class="card-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </div>
                            <h3 class="card-title" data-i18n="emailTitle">邮箱</h3>
                            <p class="card-desc" data-i18n="emailDesc">点击复制邮箱地址</p>
                            <div class="email-display" id="emailDisplay">wazixwx@wazixwx.com</div>
                        </div>
                    </div>

                    <!-- Steam -->
                    <div class="link-card steam-card" id="steamCard">
                        <div class="card-glow"></div>
                        <div class="card-inner">
                            <div class="card-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 16v-4"></path>
                                    <path d="M12 8h.01"></path>
                                </svg>
                            </div>
                            <h3 class="card-title">Steam</h3>
                            <p class="card-desc" data-i18n="steamDesc">点击复制好友代码</p>
                            <div class="code-display" id="steamCode">1057277713</div>
                        </div>
                    </div>

                    <!-- 游戏ID -->
                    <div class="link-card game-card">
                        <div class="card-glow"></div>
                        <div class="card-inner">
                            <div class="card-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                    <line x1="8" y1="21" x2="16" y2="21"></line>
                                    <line x1="12" y1="17" x2="12" y2="21"></line>
                                </svg>
                            </div>
                            <h3 class="card-title" data-i18n="gameTitle">游戏ID</h3>
                            <p class="card-desc" data-i18n="gameDesc">全平台同名</p>
                            <div class="game-id" data-i18n="gameId">超帅袜狗</div>
                            <p class="game-note" data-i18n="gameNote">也许有例外 ;)</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 页脚 -->
            <footer class="footer">
                <div class="footer-line"></div>
                <p class="footer-text" data-i18n="footer">Made with 💜 by 袜子</p>
            </footer>
        </div>
    </main>

    <div class="copy-toast" id="copyToast">
        <span class="toast-icon">✓</span>
        <span class="toast-text" data-i18n="toastText">已复制到剪贴板</span>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
