<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- 外发光 -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4" filter="url(#blur)"/>

  <!-- 主圆环 -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#glow)" stroke-width="2.5"/>

  <!-- 内部装饰线 -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.6"/>

  <!-- 中心核心 -->
  <circle cx="50" cy="50" r="10" fill="url(#glow)"/>
  <circle cx="50" cy="50" r="6" fill="#1a1a2e"/>
  <circle cx="50" cy="50" r="3" fill="url(#glow)"/>

  <!-- 四个方向的装饰点 -->
  <circle cx="50" cy="16" r="2.5" fill="url(#glow)"/>
  <circle cx="50" cy="84" r="2.5" fill="url(#glow)"/>
  <circle cx="16" cy="50" r="2.5" fill="url(#glow)"/>
  <circle cx="84" cy="50" r="2.5" fill="url(#glow)"/>

  <!-- 对角线装饰点 -->
  <circle cx="28.8" cy="28.8" r="1.8" fill="url(#glow)" opacity="0.7"/>
  <circle cx="71.2" cy="71.2" r="1.8" fill="url(#glow)" opacity="0.7"/>
  <circle cx="71.2" cy="28.8" r="1.8" fill="url(#glow)" opacity="0.7"/>
  <circle cx="28.8" cy="71.2" r="1.8" fill="url(#glow)" opacity="0.7"/>
</svg>